name: CI — Lint, Type Check & Test

on:
  push:
    branches: [develop, staging]
  pull_request:
    branches: [main, staging, develop]

# Cancel in-progress runs for the same PR/branch to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  # Public Supabase vars are safe in CI env — no secrets here
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_DEV }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_DEV }}
  NEXT_PUBLIC_APP_VERSION: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Lint + Format Check
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: TypeScript type check
  # ─────────────────────────────────────────────────────────────────────────
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run type-check

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Unit & Integration Tests
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Job 4: Build check
  # Ensures the Next.js build compiles successfully before any deploy.
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    env:
      # Build-time env vars (non-secret, safe for CI)
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Job 5: Supabase keep-alive
  # Prevents free-tier Supabase project from pausing after 7 days inactivity.
  # Runs only on schedules, not on push/PR.
  # ─────────────────────────────────────────────────────────────────────────
  supabase-keepalive:
    name: Supabase Keep-Alive
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Ping Supabase health endpoint
        run: |
          curl --fail --silent \
            "${{ secrets.NEXT_PUBLIC_SUPABASE_URL_DEV }}/rest/v1/?select=1" \
            -H "apikey: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_DEV }}" \
            || echo "Keep-alive ping failed — check Supabase project status"
